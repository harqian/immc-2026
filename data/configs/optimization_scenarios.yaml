# intervention cost fields below are annualized USD scenario costs
scenarios:
  - scenario_id: etosha_placeholder_baseline
    description: placeholder optimization scenario for phase 1 schema validation
    active_asset_types:
      - car
      - drone
      - camera
    alpha_values:
      - 1.0
      - 0.95
      - 0.9
    top_site_count: 60
    merge_distance_m: 1500.0
    waterhole_influence_radius_m: 5000.0
    protection_benefit:
      wildlife_weight_columns:
        elephant_density_norm: 1.0
        rhino_support_norm: 1.3
        lion_support_norm: 0.2
        herbivore_support_norm: 0.8
      threat_weight_columns:
        poaching_risk_norm: 1.0
        wildfire_risk_norm: 0.6
        tourism_risk_norm: 0.4
      leverage_scale: 1.0
      minimum_positive_floor: 0.01
      camera_gain_factor: 0.5
    human_operability_penalty:
      abundance_column: lion_support_norm
      abundance_weight: 0.5
      camp_distance_column: dist_to_camp_m
      camp_distance_weight: 0.3
      terrain_roughness_column: historical_fire_event_count
      terrain_roughness_weight: 0.2
      penalty_floor: 0.0
      penalty_ceiling: 2.0
    artificial_waterhole_interventions:
      enabled: true
      capital_cost: 4150.0
      tourism_cost: 400.0
      expected_density_dispersion_benefit: 0.15
