simulation:
  t_start: 0
  t_end: 1825        # 5 years in days
  dt_max: 1.0        # max step size for solver

species:
  zebra:
    N0: 13000
    r_s: null          # governed by LV, not logistic
    mu_fire_base: 0.00015
    alpha_poach_base: 0.0001
    w_poach: 0.08
    beta_tourism: 0.0001
    resource_requirements:
      water: 0.05
      forage: 0.06
      space: 0.04
  lion:
    N0: 500
    r_s: null          # governed by LV
    mu_fire_base: 0.0005
    alpha_poach_base: 0.001
    w_poach: 0.7
    beta_tourism: 0.0002
    resource_requirements:
      water: 0.08
      forage: 0.02
      space: 0.12
  elephant:
    N0: 2500
    r_s: 0.0003        # slow reproduction
    mu_fire_base: 0.0002
    alpha_poach_base: 0.0003
    w_poach: 1.0
    beta_tourism: 0.0002
    resource_requirements:
      water: 0.15
      forage: 0.12
      space: 0.08
  black_rhino:
    N0: 70
    r_s: 0.0004
    mu_fire_base: 0.0003
    alpha_poach_base: 0.0003
    w_poach: 1.5
    beta_tourism: 0.0003
    resource_requirements:
      water: 0.10
      forage: 0.08
      space: 0.10

lotka_volterra:
  lambda_1: 0.0015      # zebra intrinsic growth (~55%/yr before density dependence)
  lambda_2: 0.14         # lion conversion efficiency from predation
  gamma: 0.000001        # predation rate (~6.5 zebra/day at equilibrium, ~1.5%/month)
  delta: 0.0003          # lion natural death rate (~9yr lifespan)
  zeta: 0.000002         # lion intraspecific competition

resources:
  water:
    R0: 1000.0
    r_h: 0.02           # recovery rate
    lambda_fire: 0.03    # fire degrades water sources
    lambda_tour: 0.005   # tourism infrastructure affects water
  forage:
    R0: 1000.0
    r_h: 0.03           # grassland recovers faster
    lambda_fire: 0.05    # fire heavily damages forage
    lambda_tour: 0.002
  space:
    R0: 1000.0
    r_h: 0.01           # habitat structure slow to recover
    lambda_fire: 0.01    # fire has less effect on space
    lambda_tour: 0.008   # infrastructure permanently reduces space

wildfire:
  gamma_0: 0.6
  d_0: 0.2
  d_1: 0.8
  t_dry: 180
  c_0: 0.1
  c_1: 0.5
  seasonal_mortality_amplitude: 0.3

poaching:
  gamma_p: 0.001        # effort adjustment rate
  r_p: 0.00005          # revenue coefficient (scaled)
  omega: 0.08           # opportunity cost
  sigma_p: 0.5          # risk sensitivity
  lambda_0: 0.1         # baseline enforcement
  lambda_tourism: 0.3   # enforcement increase per tourism unit
  t_wet: 0              # peak wet season timing (Jan)
  seasonal_poach_amplitude: 0.3
  P0: 0.5               # initial poaching effort

tourism:
  w_v: 0.5
  w_w: 0.3
  w_p: 0.2
  V_max: 1000
  W_max: 500
  V_base: 400           # base daily visitors
  V_amplitude: 200      # seasonal swing
  V_growth_rate: 0.0001 # slow annual growth
  t_peak_tourism: 200   # peak tourism slightly after dry season start
  W_base: 200
  W_amplitude: 100
  P_infra: 0.15         # permanent infrastructure level (normalized)

optimization_linkage:
  fire_suppression_scale: 1.0      # how much coverage translates to u(t)
  enforcement_scale: 0.5           # how much coverage translates to Λ_opt
  tourism_beta_reduction: 0.05     # fractional reduction in β_s from interventions
